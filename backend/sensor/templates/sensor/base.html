<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Machine Monitor{% endblock %}</title>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'style.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">

<nav class="app-navbar">
    <div class="app-navbar-inner">
        <span class="app-navbar-brand">⚙️ Machine Monitor</span>
        <div class="app-navbar-links">
            <a href="{% url 'dashboard' %}" class="app-nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">Dashboard</a>
            <a href="{% url 'table' %}" class="app-nav-link {% if request.resolver_match.url_name == 'table' %}active{% endif %}">Table</a>
            <a href="{% url 'form' %}" class="app-nav-link {% if request.resolver_match.url_name == 'form' %}active{% endif %}">Form</a>
            <a href="{% url 'predict' %}" class="app-nav-link app-nav-predict {% if request.resolver_match.url_name == 'predict' %}active{% endif %}">Predict</a>
        </div>
    </div>
</nav>

{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
